<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Заявка на расчёт</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Manrope, Arial, sans-serif;
        --background: #11100e;
        --foreground: #f7f4ef;
        --muted: #a99f92;
        --border: #39352f;
        --ember: #ff5b00;
        --ember-hover: #ff7425;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: transparent;
        color: var(--foreground);
      }

      body {
        padding: 2px;
      }

      form {
        display: grid;
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label,
      .label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--background);
        color: var(--foreground);
        caret-color: var(--ember);
        font: inherit;
        font-size: 16px;
        line-height: 1.4;
        outline: none;
        padding: 12px 16px;
      }

      input:focus,
      textarea:focus {
        border-color: var(--ember);
        box-shadow: 0 0 0 2px rgb(255 91 0 / 14%);
      }

      input::placeholder,
      textarea::placeholder {
        color: #7f776c;
        opacity: 1;
      }

      textarea {
        min-height: 116px;
        resize: vertical;
      }

      .consent {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
        letter-spacing: 0;
        text-transform: none;
      }

      .consent input {
        width: 16px;
        height: 16px;
        margin: 2px 0 0;
        padding: 0;
        flex: 0 0 auto;
        accent-color: var(--ember);
      }

      a {
        color: var(--ember);
        text-underline-offset: 2px;
      }

      button {
        min-height: 50px;
        border: 0;
        border-radius: 6px;
        background: var(--ember);
        color: #120b06;
        cursor: pointer;
        font: inherit;
        font-size: 14px;
        font-weight: 800;
        padding: 14px 24px;
      }

      button:hover {
        background: var(--ember-hover);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .error {
        display: none;
        border: 1px solid rgb(239 68 68 / 45%);
        border-radius: 6px;
        background: rgb(239 68 68 / 10%);
        color: #fecaca;
        font-size: 14px;
        line-height: 1.45;
        padding: 12px 16px;
      }

      .success {
        display: none;
        min-height: 330px;
        align-content: center;
        border: 1px solid rgb(255 91 0 / 45%);
        border-radius: 12px;
        background: rgb(255 91 0 / 10%);
        padding: 28px;
      }

      .success h2 {
        margin: 0;
        font-size: 26px;
      }

      .success p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.55;
      }

      .honeypot {
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <form id="lead-form">
      <input
        class="honeypot"
        type="text"
        name="website"
        tabindex="-1"
        autocomplete="off"
        aria-hidden="true"
      />

      <div class="field">
        <label for="lead-name">Имя</label>
        <input
          id="lead-name"
          name="name"
          type="text"
          placeholder="Как к вам обращаться"
          autocomplete="name"
          required
        />
      </div>

      <div class="field">
        <label for="lead-phone">Телефон</label>
        <input
          id="lead-phone"
          name="phone"
          type="tel"
          placeholder="+7"
          autocomplete="tel"
          inputmode="tel"
          required
        />
      </div>

      <div class="field">
        <label for="lead-details">Что требуется</label>
        <textarea
          id="lead-details"
          name="details"
          placeholder="Кратко опишите задачу, объём, город и желаемый срок"
        ></textarea>
      </div>

      <label class="consent">
        <input name="consent" type="checkbox" value="1" required />
        <span>
          Согласен на обработку персональных данных в соответствии с
          <a href="/privacy/" target="_top">политикой конфиденциальности</a>.
        </span>
      </label>

      <p id="form-error" class="error" role="alert"></p>
      <button id="submit-button" type="submit">Отправить заявку →</button>
    </form>

    <section id="form-success" class="success" aria-live="polite">
      <h2>Заявка отправлена</h2>
      <p>
        Спасибо! Заявка доставлена менеджеру в Telegram. Свяжемся с вами в течение
        рабочего дня.
      </p>
    </section>

    <script>
      (() => {
        const endpoint = "https://leads.62.60.248.177.nip.io/api/leads";
        const form = document.getElementById("lead-form");
        const button = document.getElementById("submit-button");
        const error = document.getElementById("form-error");
        const success = document.getElementById("form-success");
        const attributionKeys = [
          "utm_source",
          "utm_medium",
          "utm_campaign",
          "utm_content",
          "utm_term",
          "yclid",
        ];

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          button.disabled = true;
          button.textContent = "Отправляем…";
          error.style.display = "none";
          error.textContent = "";

          const payload = new FormData(form);
          payload.set("service", "Определить менеджеру");
          payload.set("consent", "1");

          let pageUrl = document.referrer || "https://karkas-invest.ru/";
          try {
            pageUrl = window.parent.location.href;
          } catch {}
          payload.set("page_url", pageUrl);

          const search = new URL(pageUrl).searchParams;
          for (const key of attributionKeys) {
            const value = search.get(key);
            if (value) payload.set(key, value);
          }

          try {
            const response = await fetch(endpoint, {
              method: "POST",
              body: payload,
              headers: { Accept: "application/json" },
            });
            const result = await response.json().catch(() => ({}));
            if (!response.ok || !result.success) {
              throw new Error(result.message || "Не удалось отправить заявку");
            }

            form.style.display = "none";
            success.style.display = "grid";
            try {
              window.parent.ym?.(110755114, "reachGoal", "lead_submit_success", {
                source: "site_form",
              });
            } catch {}
          } catch (submitError) {
            error.textContent =
              submitError instanceof Error
                ? submitError.message
                : "Не удалось отправить заявку. Напишите нам в мессенджер.";
            error.style.display = "block";
            button.disabled = false;
            button.textContent = "Отправить заявку →";
          }
        });
      })();
    </script>
  </body>
</html>
